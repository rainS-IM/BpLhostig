<html>
<head>
<title>Robot Unicorn Attack</title>
<meta name="description" content="Robot Unicorn Attack. Play your favourite game without ads and boring loading screens."/>
<script async src="https://stats.keklolwtf.net/script.js" data-website-id="d1260de0-20b4-4d0d-b743-39e158274747"></script>
</head>
<body onclick="this.style.backgroundColor = this.style.backgroundColor ? '' : '#000000';">
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.addEventListener("load", (event) => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    player.config = {
      "autoplay": "on",
      "unmuteOverlay": "hidden",
      "upgradeToHttps": true,
      "scale": "showAll",
      "quality": "best",
      "preloader": true,
    };
    player.style = "width: 100%; height: 100%; display: block;"
    const game = document.getElementById("game");
    game.appendChild(player);
      player.load("unicorn-v1.swf");
    });
</script>
<script src="ruffle.js"></script>
<div id="game" style="--logo-display: none; width: 800px; height: 600px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);">
</div>
</body>
</html>
